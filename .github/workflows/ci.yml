name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'ACKNOWLEDGMENTS'
      - 'AUTHORS'
      - 'COPYING'
      - 'COPYING_ADDENDUM'
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'ACKNOWLEDGMENTS'
      - 'AUTHORS'
      - 'COPYING'
      - 'COPYING_ADDENDUM'
      - 'docs/**'
      - 'README.md'

jobs:
  format:
    runs-on: ubuntu-latest

    env:
      CLANG_FORMAT_VERSION: 17

    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install package dependencies
        run: sudo apt-get install -y clang-format-${{ env.CLANG_FORMAT_VERSION }}

      - name: Set git configuration
        run: git config --global clangFormat.binary clang-format-${{ env.CLANG_FORMAT_VERSION }}

      - name: Check formatting (push to feature branch)
        if: github.ref != 'refs/heads/master' && github.event_name == 'push'
        run: test/scripts/gh_format.sh origin/master

      - name: Check formatting (push to master branch or pull request merge)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: test/scripts/gh_format.sh ${{ github.event.before }}

      - name: Check formatting (pull request)
        if: github.event_name == 'pull_request'
        run: test/scripts/gh_format.sh origin/${{ github.base_ref }}

  daos-test:
    runs-on: ubuntu-latest

    container:
      image: rockylinux:8
      options: --privileged

    continue-on-error: ${{ matrix.hdf5_ref == 'develop' }}

    strategy:
      fail-fast: false
      matrix:
        hdf5_ref: [hdf5_1.14.6, develop]

    env:
      DAOS_REPO_URL: https://packages.daos.io/v2.6/EL8/packages/x86_64/daos_packages.repo
      DAOS_GPG_KEY_URL: https://packages.daos.io/RPM-GPG-KEY

    steps:
      - name: Install build prerequisites
        run: |
          dnf install -y epel-release
          dnf groupinstall -y "Development Tools"
          dnf install -y cmake git wget mpich mpich-devel libuuid-devel psmisc python3
          echo "/usr/lib64/mpich/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=/usr/lib64/mpich/lib:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: Install DAOS (server, client, admin, devel)
        run: |
          wget -O /etc/yum.repos.d/daos-packages.repo "$DAOS_REPO_URL"
          rpm --import "$DAOS_GPG_KEY_URL"
          dnf install -y daos-server daos-client daos-admin daos-devel

      - name: Disable transparent hugepages
        run: |
          echo "Before: $(cat /sys/kernel/mm/transparent_hugepage/enabled)"
          echo never > /sys/kernel/mm/transparent_hugepage/enabled
          echo "After:  $(cat /sys/kernel/mm/transparent_hugepage/enabled)"

      - name: Mount /dev/hugepages
        # We run with no NVMe/bdev tier and nr_hugepages=0, but daos_server's
        # SPDK housekeeping still unconditionally tries to clean up hugepages
        # at engine start/stop and logs a scary (but harmless) "ERROR:" line
        # when /dev/hugepages doesn't exist.
        run: |
          mkdir -p /dev/hugepages
          mount -t hugetlbfs none /dev/hugepages || true

      - name: Checkout vol-daos
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          path: vol-daos

      - name: Checkout HDF5 (${{ matrix.hdf5_ref }})
        uses: actions/checkout@v3
        with:
          repository: HDFGroup/hdf5
          ref: ${{ matrix.hdf5_ref }}
          path: hdf5

      # Builds HDF5 as the top-level project with vol-daos pulled in as an
      # HDF5_VOL_ALLOW_EXTERNAL=LOCAL_DIR subproject, matching how HDF5's own
      # CI tests other external VOL connectors (vol_async.yml, vol_cache.yml,
      # vol_rest.yml in HDFGroup/hdf5). HDF5's test/API/CMakeLists.txt
      # registers ctest entries for vol-daos automatically via
      # HDF5_EXTERNAL_VOL_TARGETS -- vol-daos does not need its own API-test
      # CMake wiring. See docs/api-tests-migration.md.
      - name: Configure HDF5 with vol-daos as an external VOL connector
        run: |
          cmake -S hdf5 -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=ON \
            -DHDF5_TEST_API=ON \
            -DHDF5_ENABLE_PARALLEL=ON \
            -DHDF5_ENABLE_MAP_API=ON \
            -DMPIEXEC_MAX_NUMPROCS=2 \
            -DHDF5_VOL_TEST_ENABLE_PARALLEL=ON \
            -DHDF5_VOL_ALLOW_EXTERNAL=LOCAL_DIR \
            -DHDF5_VOL_PATH01="$(pwd)/vol-daos" \
            "-DHDF5_VOL_VOL-DAOS_NAME=daos" \
            "-DHDF5_VOL_VOL-DAOS_TEST_PARALLEL=ON"

      - name: Build HDF5 and vol-daos
        run: cmake --build build -j"$(nproc)"

      - name: Start DAOS server/agent and create pool
        # Started once for the whole job (not per test), matching how HDF5's
        # own CI starts REST VOL's HSDS server: a plain background process
        # outside CMake/ctest, not through HDF5's own C++ test-API driver.
        run: |
          daos_server_yml=$(find build -name daos_server.yml -print -quit)
          daos_agent_sh=$(find build -name daos_agent.sh -print -quit)
          daos_pool_sh=$(find build -name daos_pool.sh -print -quit)
          echo "daos_server_yml=$daos_server_yml" >> "$GITHUB_ENV"
          echo "daos_agent_sh=$daos_agent_sh" >> "$GITHUB_ENV"
          echo "D_LOG_FILE=$(pwd)/daos_client.log" >> "$GITHUB_ENV"

          mpiexec -n 1 -genv DAOS_DISABLE_REQ_FWD 1 \
            daos_server start -o "$daos_server_yml" \
            > daos_server.out 2>&1 &
          for i in $(seq 1 60); do
            grep -q "DAOS I/O Engine" daos_server.out && break
            sleep 1
          done
          cat daos_server.out

          "$daos_agent_sh" > daos_agent.out 2>&1 &
          for i in $(seq 1 60); do
            grep -q "listening on" daos_agent.out && break
            sleep 1
          done
          cat daos_agent.out

          "$daos_pool_sh" | tee daos_pool.out
          pool_uuid=$(grep -oE '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' daos_pool.out | head -n1)
          if [ -z "$pool_uuid" ]; then
            echo "::error::failed to create DAOS pool, no UUID found in daos_pool_sh output"
            exit 1
          fi
          echo "DAOS_POOL=$pool_uuid" >> "$GITHUB_ENV"

          # dmg reporting the pool created doesn't mean the client-side
          # attach path (what H5_daos_init() uses, as opposed to dmg's own
          # admin RPCs) is settled yet -- daos_control.log shows a transient
          # "pool ... is locked" message right as the pool comes online, and
          # the very first API tests run consistently fail with
          # DER_AGENT_COMM while later, longer-running tests succeed.
          sleep 15

      - name: Run tests
        env:
          D_LOG_MASK: ERR
          CRT_PHY_ADDR_STR: ofi+tcp
          OFI_INTERFACE: lo
          HDF5_VOL_CONNECTOR: daos
          # Disable automatic chunk sizing for the API tests
          HDF5_DAOS_CHUNK_TARGET_SIZE: "1073741824"
        # Excludes known, tracked connector gaps (not regressions) so CI
        # stays green on everything actually verified so far. See
        # docs/api-tests-migration.md for how these are tracked:
        #   - h5_api_test_attribute: decreasing-order (H5_ITER_DEC) attribute
        #     iteration is unsupported (daos_vol_attr.c).
        #   - h5_api_ext_test_testhdf5: paginated attribute name/index
        #     resolution bug, only triggered once a group holds hundreds of
        #     attributes.
        run: |
          # daos_agent_sh lives in test/scripts/; the agent socket it starts
          # lives one level up, in test/.
          daos_agent_dir=$(dirname "$(dirname "$daos_agent_sh")")
          HDF5_PLUGIN_PATH="$(find build -name 'libhdf5_vol_daos*' -printf '%h\n' -quit)" \
          DAOS_AGENT_DRPC_DIR="$daos_agent_dir" \
          ctest --test-dir build --output-on-failure --timeout 300 \
            -R 'HDF5_VOL_vol-daos' \
            -E '^HDF5_VOL_vol-daos-h5_api_test_attribute$|^HDF5_VOL_vol-daos-h5_api_ext_test_testhdf5$'

      - name: Stop DAOS server/agent
        if: always()
        run: |
          killall -9 daos_server || true
          killall daos_agent || true

      - name: Dump DAOS logs
        if: always()
        run: |
          for f in daos_server.out daos_agent.out daos_pool.out; do
            [ -f "$f" ] && echo "=============== $f ===============" && cat "$f"
          done
          for f in $(find build -name '*.log' 2>/dev/null); do
            echo "=============== $f ==============="
            cat "$f"
          done

